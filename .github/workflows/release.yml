name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build PingMon.csproj -c Release

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Release/net48/PingMon.exe
